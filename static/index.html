<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OpenDoor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --accent:  #4f8ef7;
      --accent2: #6ee7b7;
      --danger:  #f87171;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 3rem;
      gap: 2rem;
    }

    header { text-align: center; }
    header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.03em; }
    header p  { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }

    /* ── Door button ── */
    #btn-open {
      width: 200px; height: 200px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: radial-gradient(circle at 40% 35%, #1e3a5f, #0f1117 70%);
      color: var(--accent);
      font-size: 1rem; font-weight: 600; letter-spacing: 0.05em;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s;
      box-shadow: 0 0 32px #4f8ef730;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-open svg { width: 48px; height: 48px; }
    #btn-open:active { transform: scale(0.94); }
    #btn-open.success { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 40px #6ee7b740; }
    #btn-open.error   { border-color: var(--danger);  color: var(--danger);  box-shadow: 0 0 40px #f8717140; }
    #btn-open:disabled { opacity: 0.5; cursor: default; }

    /* ── Status ── */
    #status {
      min-height: 1.4rem;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      transition: color 0.2s;
    }
    #status.ok  { color: var(--accent2); }
    #status.err { color: var(--danger); }

    /* ── Divider ── */
    .divider {
      width: 100%; max-width: 360px;
      border: none; border-top: 1px solid var(--border);
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .card h2 { font-size: 1rem; font-weight: 600; }

    /* ── Input ── */
    input[type="text"] {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      padding: 0.625rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-ghost    { background: transparent; border: 1px solid var(--border); color: var(--text); }

    /* ── Device list ── */
    #device-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .device-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
    }
    .device-item .device-name { font-weight: 500; }
    .device-item .device-date { color: var(--muted); font-size: 0.75rem; }
    .btn-del {
      background: none; border: none; color: var(--danger);
      cursor: pointer; font-size: 1.1rem; padding: 0 0.25rem;
      line-height: 1;
    }
    #no-devices { color: var(--muted); font-size: 0.875rem; text-align: center; }

    #reg-status { font-size: 0.85rem; min-height: 1.2rem; }
    #reg-status.ok  { color: var(--accent2); }
    #reg-status.err { color: var(--danger); }
  </style>
</head>
<body>

  <header>
    <h1>OpenDoor</h1>
    <p>Biometrisch authentifizieren &amp; Tür öffnen</p>
  </header>

  <!-- Big door button -->
  <button id="btn-open">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 21h18M9 21V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v16"/>
      <circle cx="14.5" cy="13" r="0.5" fill="currentColor"/>
    </svg>
    ÖFFNEN
  </button>

  <div id="status"></div>

  <hr class="divider">

  <!-- Register new device -->
  <div class="card">
    <h2>Gerät registrieren</h2>
    <input type="text" id="device-name" placeholder="Gerätename, z.B. iPhone 15" maxlength="40">
    <button class="btn btn-primary" id="btn-register">Gerät hinzufügen</button>
    <div id="reg-status"></div>
  </div>

  <!-- Registered devices -->
  <div class="card">
    <h2>Registrierte Geräte</h2>
    <div id="device-list"><p id="no-devices">Keine Geräte registriert.</p></div>
    <button class="btn btn-ghost" id="btn-refresh">Aktualisieren</button>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
